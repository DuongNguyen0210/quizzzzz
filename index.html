<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Thi Mạng Máy Tính</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap');

  :root {
    --bg: #0f1117;
    --card: #1a1d2e;
    --card2: #1e2235;
    --border: #2e3250;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #43e97b;
    --red: #ff4d6d;
    --yellow: #ffd166;
    --text: #e8eaf6;
    --muted: #8b92b8;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 860px; margin: 0 auto; position: relative; z-index: 1; }

  /* HEADER */
  .header {
    text-align: center;
    padding: 40px 0 30px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    background: linear-gradient(135deg, #6c63ff, #a78bfa, #ff6584);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .header p { color: var(--muted); font-size: 0.95rem; }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    align-items: center;
  }
  .controls label { color: var(--muted); font-size: 0.85rem; white-space: nowrap; }
  .controls select, .controls input[type=number] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .controls select:focus, .controls input:focus { border-color: var(--accent); }
  .controls input[type=number] { width: 70px; }
  .btn {
    padding: 9px 20px;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #7c74ff; transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .spacer { flex: 1; }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    height: 8px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #a78bfa);
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 6px;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 16px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform:none; } }

  .q-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
    gap: 12px;
  }
  .q-num {
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .q-text {
    font-size: 1rem;
    line-height: 1.65;
    font-weight: 500;
    flex: 1;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
  }
  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: rgba(108,99,255,0.08);
  }
  .option.selected { border-color: var(--accent); background: rgba(108,99,255,0.12); }
  .option.correct { border-color: var(--green) !important; background: rgba(67,233,123,0.1) !important; }
  .option.wrong   { border-color: var(--red) !important;   background: rgba(255,77,109,0.1) !important; }
  .option.disabled { cursor: default; }
  .option-letter {
    min-width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem; font-weight: 700;
    flex-shrink: 0;
    transition: all 0.18s;
  }
  .option.selected .option-letter { background: var(--accent); color: #fff; }
  .option.correct .option-letter  { background: var(--green); color: #111; }
  .option.wrong .option-letter    { background: var(--red); color: #fff; }
  .option-text { font-size: 0.92rem; line-height: 1.55; padding-top: 3px; }

  /* EXPLANATION */
  .explanation {
    display: none;
    margin-top: 14px;
    padding: 14px 16px;
    background: rgba(255,209,102,0.07);
    border-left: 3px solid var(--yellow);
    border-radius: 0 8px 8px 0;
    font-size: 0.88rem;
    color: #d4c17f;
    line-height: 1.6;
  }
  .explanation.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .explanation strong { color: var(--yellow); }

  /* NAV */
  .nav {
    display: flex;
    gap: 10px;
    justify-content: space-between;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }

  /* SCORE CARD */
  .score-card {
    display: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px;
    text-align: center;
    margin-bottom: 20px;
  }
  .score-card.show { display: block; animation: slideIn 0.4s ease; }
  .score-big {
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--green), #06d6a0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 10px;
  }
  .score-card h2 { font-size: 1.4rem; margin-bottom: 8px; }
  .score-card p  { color: var(--muted); margin-bottom: 20px; }
  .score-stats {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .stat-pill {
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 0.88rem;
    font-weight: 600;
  }
  .stat-correct { background: rgba(67,233,123,0.15); color: var(--green); border: 1px solid rgba(67,233,123,0.3); }
  .stat-wrong   { background: rgba(255,77,109,0.15);  color: var(--red);   border: 1px solid rgba(255,77,109,0.3); }
  .stat-skip    { background: rgba(139,146,184,0.15); color: var(--muted); border: 1px solid rgba(139,146,184,0.3); }

  /* QUESTION MAP */
  .q-map {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 24px;
    padding: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .q-dot {
    width: 28px; height: 28px;
    border-radius: 6px;
    font-size: 0.65rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--card2);
    color: var(--muted);
    transition: all 0.15s;
  }
  .q-dot:hover { border-color: var(--accent); color: var(--accent); }
  .q-dot.current { border-color: var(--accent); background: rgba(108,99,255,0.2); color: var(--text); }
  .q-dot.answered-correct { background: rgba(67,233,123,0.2); border-color: var(--green); color: var(--green); }
  .q-dot.answered-wrong   { background: rgba(255,77,109,0.2); border-color: var(--red);   color: var(--red); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📚 Ôn Thi Mạng Máy Tính</h1>
    <p>Mạng Máy Tính · 45 câu hỏi trắc nghiệm</p>
  </div>

  <div class="controls" id="controls">
    <label>Chế độ:</label>
    <select id="modeSelect">
      <option value="all">Tất cả 45 câu</option>
      <option value="random">Ngẫu nhiên</option>
    </select>
    <label id="numLabel" style="display:none">Số câu:</label>
    <input type="number" id="numQ" value="20" min="5" max="45" style="display:none">
    <div class="spacer"></div>
    <button class="btn btn-primary" onclick="startQuiz()">▶ Bắt đầu</button>
    <button class="btn btn-outline" onclick="toggleMap()">🗺 Bản đồ</button>
  </div>

  <div class="q-map" id="qMap" style="display:none"></div>

  <div class="progress-text" id="progressText" style="display:none">
    <span id="progressLabel">Câu 1 / 45</span>
    <span id="progressScore">✓ 0 &nbsp; ✗ 0</span>
  </div>
  <div class="progress-bar-wrap" id="progressWrap" style="display:none">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <div id="questionArea"></div>

  <div class="nav" id="navArea" style="display:none">
    <button class="btn btn-outline" id="btnPrev" onclick="goTo(currentIdx-1)">← Trước</button>
    <button class="btn btn-outline" onclick="goTo(currentIdx+1)">Tiếp →</button>
    <button class="btn btn-primary" onclick="finishQuiz()">🏁 Kết quả</button>
  </div>

  <div class="score-card" id="scoreCard">
    <div class="score-big" id="scoreBig"></div>
    <h2 id="scoreTitle"></h2>
    <p id="scoreDesc"></p>
    <div class="score-stats">
      <span class="stat-pill stat-correct" id="statCorrect"></span>
      <span class="stat-pill stat-wrong"   id="statWrong"></span>
      <span class="stat-pill stat-skip"    id="statSkip"></span>
    </div>
    <button class="btn btn-primary" onclick="restartQuiz()" style="margin-right:10px">🔄 Làm lại</button>
    <button class="btn btn-outline" onclick="reviewAnswers()">📋 Xem đáp án</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  {q:`Trong địa chỉ định danh toàn cầu của IPv6 thì phần định tuyến toàn cầu chiếm bao nhiêu bit?`,opts:["128","64","32","48"],ans:3,exp:``},
  {q:`Bạn thuê đường truyền internet tại phòng trọ có băng thông 20Mbps, vậy để tải một đoạn phim có dung lượng 50Mbyte thì phải mất bao nhiêu thời gian?`,opts:["52s","60s","32s","Tất cả đều sai"],ans:3,exp:``},
  {q:`Cho sơ đồ như hình vẽ. Hãy xác định số lượng miền broadcast tương ứng trong sơ đồ mạng đã cho và xác định phương án cấp phát địa chỉ IP hợp lệ cho VLAN 2?`, img: "Image/4.jpg", opts:["6 miền broadcast và subnet cấp cho VLAN 2 là 10.0.0.0/26","7 miền broadcast và subnet cấp cho VLAN 2 là 192.168.5.0/24","7 miền broadcast và subnet cấp cho VLAN 2 là 10.0.0.0/26","6 miền broadcast và subnet cấp cho VLAN 2 là 192.168.5.0/24"],ans:1,exp:``},
  {q:`Kết nối Ethernet giữa RRAS1 và RRAS2 cần nhiều nhất 28 IP. Vậy mạng con nào dưới đây là thích hợp và lãng phí ít IP nhất?`,opts:["192.1.1.224/30","192.1.1.160/28","192.1.1.16/26","192.1.1.196/29","192.1.1.96/27"],ans:4,exp:``},
  {q:`Khi một frame không có tag đi vào trunk port, switch sẽ thực thi tác vụ nào sau đây?`,opts:["Drop frame","Gán ngẫu nhiên VLAN","Gán frame vào VLAN 1","Gán vào Native VLAN đã cấu hình"],ans:3,exp:``},
  {q:`Một địa chỉ mạng lớp C (/24) cần chia subnet thoả mãn điều kiện sau. Số lượng subnet cần chia là 6 và tại mỗi subnet có 25 máy trạm. Phương án chia mạng con với các chỉ số N(số bit phần mạng), S(số bit mượn), H(số bit phần host) nào sau đây phù hợp?`,opts:["N = 24, S = 4, H = 4","N = 24, S = 3, H = 5","N = 24, S = 4, H = 5","N = 24, S = 3, H = 6"],ans:1,exp:``},
  {q:`Định tuyến OSPF được đã được kích hoạt trên B trong sơ đồ sau. Các câu lệnh nào sau đây là đúng khi cấu hình? (Chọn tất cả các đáp án đúng)`,opts:["B(config-router)#network 192.168.5.0 0.0.0.255 area 0","B(config-router)#network 192.168.2.0 0.0.0.255 area 0","B(config-router)#network 192.168.3.0 0.0.0.255 area 0","B(config-router)#default-information originate","B(config-router)#network 192.168.4.0 0.0.0.255 area 0","B(config-router)#network 192.168.1.0 0.0.0.255 area 0"],ans:[1,2,4],exp:``},
  {q:`Lớp C riêng (x=192; u=16) được phép mượn tối đa bao nhiêu bit cho để phân chia mạng con (subnetting)?`,opts:["14","24","16","8"],ans:0,exp:``},
  {q:`Dịch vụ mạng SMTP dùng để?`,opts:["Nhận thư điện tử","Tất cả đều đúng","Phân giải tên","Gửi thư điện tử"],ans:3,exp:``},
  {q:`Trong các địa chỉ nào sau đây, địa chỉ nào là địa chỉ unicast (truyền thông 1 - 1)?`,opts:["192.168.24.56/29","172.31.181.255/20","224.0.0.5","255.255.255.255","FFFF.FFFF.FFFF"],ans:1,exp:``},
  {q:`Phát biểu nào sau đây là sai về chỉ số tin cậy (Administrative Distance) trong kỹ thuật định tuyến?`,opts:["Chỉ số tin cậy AD chỉ áp dụng cho các thông tin định tuyến động","AD định ra mức độ ưu tiên... AD càng thấp thì ưu tiên càng cao","Giá trị AD mặc định của EIGRP là 90","Giá trị AD mặc định của OSPF là 110"],ans:0,exp:`Phát biểu này sai vì AD áp dụng cho cả định tuyến tĩnh.`},
  {q:`Chuyên viên quản trị mạng của công ty Banana đang cấu hình dịch vụ DHCP để cấp địa chỉ IP động cho các máy trạm trong mạng con 192.168.1.32/28. Hai địa chỉ IP lớn nhất được gán tĩnh cho 2 máy chủ. Cổng ra vào ngầm định được gán địa chỉ IP thấp nhất. Vậy dải IP nào sau đây nên được cấu hình trên máy chủ DHCP?`,opts:["192.168.1.34 - 192.168.1.61","192.168.1.33 - 192.168.1.60","192.168.1.34 - 192.168.1.46","192.168.1.33 - 192.168.1.43","192.168.1.34 - 192.168.1.44"],ans:4,exp:``},
  {q:`Mô hình mạng khách/chủ (client/server) có những đặc điểm:`,opts:["Phù hợp với môi trường doanh nghiệp lớn","Máy chủ có cấu hình mạnh, bảo mật cao","Tất cả đều đúng","Phân rõ vai trò máy trạm và máy chủ"],ans:2,exp:``},
  {q:`Chọn ít nhất 1 câu đúng về giao thức ARP?`,opts:["Giao thức tìm kiếm bằng cách quảng bá để hỏi thông tin trên toàn mạng LAN","Là giao thức xác định địa chỉ IP từ địa chỉ vật lý","Là giao thức xác định địa chỉ vật lý từ địa chỉ IP","Là giao thức xác định địa chỉ IP từ tên miền"],ans:[0,2],exp:``},
  {q:`Địa chỉ định danh toàn cầu IPv6 cho phép kết nối với:`,opts:["Nhóm làm việc","Mạng cục bộ","Mạng diện rộng","Mạng riêng"],ans:2,exp:``},
  {q:`Cho sơ đồ như hình vẽ. Biết rằng kết nối WAN giữa router R1 và router R3 chạy trên công nghệ Ethernet cáp quang... Tại router R3, câu lệnh nào sau đây cho phép cấu hình định tuyến tĩnh đến mạng 2001:db8:1:1::/64?`, img: "Image/2.jpg", opts:["R3(config)#ipv6 route 2001:db8:1:1:: g0/1 2001:db8:1:5::1","R3(config)#ipv6 route 2001:db8:1:1::/64 g0/1","R3(config)#ipv6 route 2001:db8:1:1:: 2001:db8:1:5::1","R3(config)#ipv6 route 2001:db8:1:1::/64 g0/1 2001:db8:1:5::1"],ans:3,exp:``},
  {q:`IPv6 có các loại địa chỉ sau đây: (Chọn 3 đáp án đúng)`,opts:["IPv6 Multicast","IPv6 Forecast","IPv6 Broadcast","IPv6 Unicast","IPv6 Anycast","IPv6 Podcast"],ans:[0,3,4],exp:``},
  {q:`Công nghệ nào sau đây được sử dụng trong kết nối WAN?`,opts:["Wifi 802.11","USB","HDMI","HDLC"],ans:3,exp:``},
  {q:`Dạng thập phân của số 10101001 là:`,opts:["163","167","168","169"],ans:3,exp:``},
  {q:`Các kỹ thuật nào sau đây được dùng để chống lặp định tuyến khi triển khai các giao thức định tuyến ứng dụng thuật toán vector khoảng cách? (Chọn tất cả các đáp án đúng)`,opts:["Split horizon","Shortest path first (SPF)","Spanning Tree Protocol (STP)","Link-state advertisements (LSA)","Triggered Update","Hold-down timers"],ans:[0,4,5],exp:``},
  {q:`Switch là thiết bị hoạt động tại tầng nào trong mô hình OSI?`,opts:["Tầng liên kết dữ liệu","Tầng vận chuyển","Tầng vật lý","Tầng mạng"],ans:0,exp:``},
  {q:`Một mạng lớp C (/24) cần chia thành 9 mạng con sử dụng Subnet Mask nào sau đây:`,opts:["255.0.0.255","255.224.255.0","255.255.255.240","255.255.255.224"],ans:2,exp:``},
  {q:`Phát biểu nào dưới đây là đúng:`,opts:["TCP và HTTP là những giao thức được cài đặt ở tầng giao vận","SMTP và PPP là những giao thức được cài đặt ở tầng vật lý","Telnet, HTTP, SMTP, FTP là những giao thức được cài đặt ở tầng ứng dụng (Application Layer).","IP là giao thức được cài đặt ở tầng liên kết dữ liệu"],ans:2,exp:``},
  {q:`Hãy chỉ ra địa chỉ IP của host không hợp lệ với Subnet Mask 255.255.255.224`,opts:["222.81.56.30","222.81.55.128","222.81.65.35","222.81.22.104"],ans:1,exp:``},
  {q:`Cho các mạng có kết nối trực tiếp vào router R1: 192.168.8.0/24, 192.168.9.0/24, 192.168.10.0/24, 192.168.11.0/24. Hãy cho biết địa chỉ mạng tổng hợp nhận được sau khi rút gọn thông tin định tuyến trên Router R1?`,opts:["192.168.8.0/21","192.168.8.0/23","192.168.8.0/22","192.168.8.0/24"],ans:2,exp:``},
  {q:`Tầng nào trong mô hình OSI có chức năng định tuyến giữa các mạng?`,opts:["Network","Data Link","Physical","Transport"],ans:0,exp:``},
  {q:`Các giao thức nào cho tầng Transport của OSI (chọn tất cả các phương án đúng)`,opts:["IP","TCP","DNS","UDP"],ans:[1,3],exp:``},

  {q:`Cho sơ đồ như hình vẽ. Xét tình huống Fred không truy cập được web server. Router B không có route đến mạng 217.110.2.0/24. Gói tin ICMP nào được gửi về Fred?`, img: "Image/1.jpg", opts:["Type 3 (Destination Unreachable), Code 0 (Network unreachable)","Type 11 (Time Exceeded), Code 0 (TTL expired)","Type 8, Code 0","Type 0, Code 0"],ans:0,exp:``},

  {q:`Bộ định tuyến Banana biết được đường đến 1 mạng ở xa từ thông tin được cung cấp bởi RIP, OSPF và 1 tuyến tĩnh. Giả sử rằng tất cả các giao thức định tuyến trên đều sử dụng khoảng cách quản trị ngầm định của chúng, vậy Banana sẽ sử dụng tuyến nào để chuyển dữ liệu đến mạng ở xa?`,opts:["Banana sẽ sử dụng tuyến tĩnh","...","Cân bằng tải và sử dụng tất cả 3 tuyến","Banana sẽ sử dụng tuyến OSPF","Banana sẽ sử dụng tuyến RIP"],ans:0,exp:``},

  {q:`Giả sử tại một router có bảng định tuyến được cho như hình vẽ. Hãy cho biết router sẽ xử lý thế nào đối với gói tin có địa chỉ đích là 192.168.50.10 và giá trị TTL = 1?`,opts:["Chuyển gói tin ra cổng E2 và giảm TTL = 0","Chuyển gói tin ra cổng E4 và giảm TTL = 0","Chuyển gói tin ra cổng E3 và giảm TTL = 0","Hủy gói tin và gửi ICMP Time Exceeded"],ans:3,exp:``},

  {q:`Cho địa chỉ vật lý 00:1A:2B:3C:4D:5E. Địa chỉ link local IPv6 tương ứng được tạo ra theo cơ chế EUI-64 là địa chỉ nào?`,opts:["FD80::021A:2BFF:FF3C:4D5E","FE80::021A:2BFF:FE3C:4D5E","FD80::021A:2BFF:FE3C:4D5E","FE80::021A:2BFF:FF3C:4D5E"],ans:1,exp:``},
  {q:`Địa chỉ IPv6 2001:6996:0000:0000:0FE8:0000:007C:09A0 có thể được rút gọn như sau:`,opts:["2001:6996::0FE8:0000:007C:09A0","2001:6996::FE8:0:7C:9A0","2001:6996::FE8::7C:9A0","2001:6996:0:0:FE8:0:7C:9A0"],ans:1,exp:``},
  {q:`Giả sử hệ thống mạng của bạn phải chia thành 8 mạng con (subnet) và sử dụng một địa chỉ lớp B (/16). Mỗi mạng con chứa ít nhất 2500 host. Vậy subnet mask nào sẽ được sử dụng:`,opts:["255.255.224.0","255.255.240.0","255.255.248.0","255.255.252.0"],ans:0,exp:`Hoặc chọn B nếu trường áp dụng quy tắc trừ 2 mạng con.`},
  {q:`Cần truyền gói tin kích thước 1000 bytes từ Host A đến Host B, trên đường truyền dài 2500 km, tốc độ lan truyền là 2.5 x 10^8 m/s, và tốc độ truyền là 2 Mbps. Thời gian cần để truyền gói tin từ A đến B là:`,opts:["10 sec","10 msec","14 msec","Tất cả đều sai"],ans:2,exp:``}
];

let questions = [];
let currentIdx = 0;
let answers = {}; // idx -> chosen option index
let mode = 'all';
let quizStarted = false;

const modeSelect = document.getElementById('modeSelect');
const numQInput = document.getElementById('numQ');
const numLabel = document.getElementById('numLabel');

modeSelect.addEventListener('change', () => {
  const isRandom = modeSelect.value === 'random';
  numLabel.style.display = isRandom ? '' : 'none';
  numQInput.style.display = isRandom ? '' : 'none';
});

function startQuiz() {
  mode = modeSelect.value;
  if (mode === 'random') {
    const n = Math.min(Math.max(parseInt(numQInput.value)||20, 5), 45);
    numQInput.value = n;
    questions = shuffle([...ALL_QUESTIONS]).slice(0, n);
  } else {
    questions = [...ALL_QUESTIONS];
  }
  answers = {};
  currentIdx = 0;
  quizStarted = true;
  document.getElementById('scoreCard').classList.remove('show');
  document.getElementById('progressText').style.display = '';
  document.getElementById('progressWrap').style.display = '';
  document.getElementById('navArea').style.display = '';
  updateProgress();
  renderQuestion(currentIdx);
  buildMap();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderQuestion(idx) {
  if (!questions.length) return;
  currentIdx = idx;
  const q = questions[idx];
  const chosen = answers[idx];
  const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];
  const disabled = chosen !== undefined;

  const optsHtml = q.opts.map((opt, i) => {
    let cls = 'option';
    const isCorrect = Array.isArray(q.ans) ? q.ans.includes(i) : i === q.ans;
    
    if (disabled) {
      cls += ' disabled';
      if (isCorrect) cls += ' correct';
      else if (i === chosen) cls += ' wrong';
    } else if (chosen === i) cls += ' selected';
    
    return `<div class="${cls}" onclick="selectOption(${idx}, ${i})">
      <div class="option-letter">${letters[i]}</div>
      <div class="option-text">${opt}</div>
    </div>`;
  }).join('');

  const expHtml = (disabled && q.exp) ? `<div class="explanation show"><strong>📖 Giải thích:</strong> ${q.exp}</div>` : `<div class="explanation"></div>`;
  
  // ĐÂY LÀ ĐOẠN XỬ LÝ ẢNH
  const imgHtml = q.img ? `<div style="margin: 15px 0; text-align: center;"><img src="${q.img}" alt="Hình ảnh câu hỏi" style="max-width: 100%; border-radius: 8px; border: 1px solid var(--border);"></div>` : '';

  document.getElementById('questionArea').innerHTML = `
    <div class="question-card">
      <div class="q-header">
        <div class="q-num">Câu ${idx+1} / ${questions.length}</div>
      </div>
      <div class="q-text">${q.q}</div>
      ${imgHtml}
      <div class="options">${optsHtml}</div>
      ${expHtml}
    </div>`;
  document.getElementById('btnPrev').disabled = idx === 0;
  updateProgress();
  updateMap();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function selectOption(idx, choice) {
  if (answers[idx] !== undefined) return;
  answers[idx] = choice;
  renderQuestion(idx);
}

function goTo(idx) {
  if (idx < 0 || idx >= questions.length) return;
  renderQuestion(idx);
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const correct = Object.keys(answers).filter(k => Array.isArray(questions[k].ans) ? questions[k].ans.includes(answers[k]) : answers[k] === questions[k].ans).length;
  const wrong = answered - correct;
  document.getElementById('progressLabel').textContent = `Câu ${currentIdx+1} / ${questions.length} · Đã làm: ${answered}`;
  document.getElementById('progressScore').textContent = `✓ ${correct}  ✗ ${wrong}`;
  document.getElementById('progressBar').style.width = `${(answered/questions.length)*100}%`;
}

function buildMap() {
  const map = document.getElementById('qMap');
  map.innerHTML = questions.map((_, i) => `<div class="q-dot" id="dot${i}" onclick="goTo(${i})">${i+1}</div>`).join('');
  updateMap();
}

function updateMap() {
  questions.forEach((q, i) => {
    const dot = document.getElementById(`dot${i}`);
    if (!dot) return;
    dot.className = 'q-dot';
    if (i === currentIdx) dot.classList.add('current');
    if (answers[i] !== undefined) {
      const isCorrect = Array.isArray(q.ans) ? q.ans.includes(answers[i]) : answers[i] === q.ans;
      dot.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
    }
  });
}

function toggleMap() {
  const map = document.getElementById('qMap');
  map.style.display = map.style.display === 'none' ? 'flex' : 'none';
}

function finishQuiz() {
  const answered = Object.keys(answers).length;
  const correct = Object.keys(answers).filter(k => Array.isArray(questions[k].ans) ? questions[k].ans.includes(answers[k]) : answers[k] === questions[k].ans).length;
  const wrong = answered - correct;
  const skip = questions.length - answered;
  const pct = Math.round((correct / questions.length) * 100);

  document.getElementById('scoreCard').classList.add('show');
  document.getElementById('scoreBig').textContent = `${pct}%`;
  document.getElementById('scoreTitle').textContent = pct >= 80 ? '🎉 Xuất sắc!' : pct >= 60 ? '👍 Khá tốt!' : '💪 Cần ôn thêm!';
  document.getElementById('scoreDesc').textContent = `${correct} đúng / ${questions.length} câu`;
  document.getElementById('statCorrect').textContent = `✓ ${correct} đúng`;
  document.getElementById('statWrong').textContent = `✗ ${wrong} sai`;
  document.getElementById('statSkip').textContent = `— ${skip} chưa làm`;
  document.getElementById('scoreCard').scrollIntoView({behavior:'smooth'});
}

function restartQuiz() {
  document.getElementById('scoreCard').classList.remove('show');
  startQuiz();
}

function reviewAnswers() {
  document.getElementById('scoreCard').classList.remove('show');
  goTo(0);
}

// init
document.getElementById('progressText').style.display = 'none';
document.getElementById('progressWrap').style.display = 'none';
document.getElementById('navArea').style.display = 'none';
document.getElementById('questionArea').innerHTML = `
  <div class="question-card" style="text-align:center;padding:48px 28px">
    <div style="font-size:3rem;margin-bottom:16px">📖</div>
    <h2 style="font-family:'Playfair Display',serif;margin-bottom:8px">Sẵn sàng ôn thi?</h2>
    <p style="color:var(--muted)">Chọn chế độ và nhấn <strong>Bắt đầu</strong> để làm bài</p>
  </div>`;
</script>
