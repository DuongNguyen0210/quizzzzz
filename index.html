<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Thi Python Cơ Bản</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap');
  :root { --bg: #0f1117; --card: #1a1d2e; --card2: #1e2235; --border: #2e3250; --accent: #6c63ff; --accent2: #ff6584; --green: #43e97b; --red: #ff4d6d; --yellow: #ffd166; --text: #e8eaf6; --muted: #8b92b8; --radius: 14px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
  body::before { content: ''; position: fixed; top: -200px; left: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  .container { max-width: 860px; margin: 0 auto; position: relative; z-index: 1; }
  .header { text-align: center; padding: 40px 0 30px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 4vw, 2.6rem); background: linear-gradient(135deg, #6c63ff, #a78bfa, #ff6584); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
  .header p { color: var(--muted); font-size: 0.95rem; }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; align-items: center; }
  .controls label { color: var(--muted); font-size: 0.85rem; white-space: nowrap; }
  .controls select, .controls input[type=number] { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-family: inherit; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
  .controls select:focus, .controls input:focus { border-color: var(--accent); }
  .controls input[type=number] { width: 70px; }
  .btn { padding: 9px 20px; border: none; border-radius: 8px; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #7c74ff; transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .spacer { flex: 1; }
  .progress-bar-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 999px; height: 8px; margin-bottom: 20px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), #a78bfa); border-radius: 999px; transition: width 0.4s ease; }
  .progress-text { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
  .question-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 16px; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform:none; } }
  .q-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; gap: 12px; }
  .q-num { background: linear-gradient(135deg, var(--accent), #a78bfa); color: #fff; font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
  .q-text { font-size: 1rem; line-height: 1.65; font-weight: 500; flex: 1; white-space: pre-wrap; }
  .options { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
  .option { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; background: var(--card2); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.18s; user-select: none; }
  .option:hover:not(.disabled) { border-color: var(--accent); background: rgba(108,99,255,0.08); }
  .option.selected { border-color: var(--accent); background: rgba(108,99,255,0.12); }
  .option.correct { border-color: var(--green) !important; background: rgba(67,233,123,0.1) !important; }
  .option.wrong   { border-color: var(--red) !important; background: rgba(255,77,109,0.1) !important; }
  .option.disabled { cursor: default; }
  .option-letter { min-width: 28px; height: 28px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 700; flex-shrink: 0; transition: all 0.18s; }
  .option.selected .option-letter { background: var(--accent); color: #fff; }
  .option.correct .option-letter  { background: var(--green); color: #111; }
  .option.wrong .option-letter    { background: var(--red); color: #fff; }
  .option-text { font-size: 0.92rem; line-height: 1.55; padding-top: 3px; }
  .explanation { display: none; margin-top: 14px; padding: 14px 16px; background: rgba(255,209,102,0.07); border-left: 3px solid var(--yellow); border-radius: 0 8px 8px 0; font-size: 0.88rem; color: #d4c17f; line-height: 1.6; white-space: pre-wrap; }
  .explanation.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .explanation strong { color: var(--yellow); }
  .nav { display: flex; gap: 10px; justify-content: space-between; margin-bottom: 30px; flex-wrap: wrap; }
  .score-card { display: none; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px; text-align: center; margin-bottom: 20px; }
  .score-card.show { display: block; animation: slideIn 0.4s ease; }
  .score-big { font-family: 'Playfair Display', serif; font-size: 5rem; font-weight: 700; background: linear-gradient(135deg, var(--green), #06d6a0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 10px; }
  .score-card h2 { font-size: 1.4rem; margin-bottom: 8px; }
  .score-card p  { color: var(--muted); margin-bottom: 20px; }
  .score-stats { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
  .stat-pill { padding: 8px 18px; border-radius: 999px; font-size: 0.88rem; font-weight: 600; }
  .stat-correct { background: rgba(67,233,123,0.15); color: var(--green); border: 1px solid rgba(67,233,123,0.3); }
  .stat-wrong   { background: rgba(255,77,109,0.15); color: var(--red); border: 1px solid rgba(255,77,109,0.3); }
  .stat-skip    { background: rgba(139,146,184,0.15); color: var(--muted); border: 1px solid rgba(139,146,184,0.3); }
  .q-map { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 24px; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }
  .q-dot { width: 28px; height: 28px; border-radius: 6px; font-size: 0.65rem; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1.5px solid var(--border); background: var(--card2); color: var(--muted); transition: all 0.15s; }
  .q-dot:hover { border-color: var(--accent); color: var(--accent); }
  .q-dot.current { border-color: var(--accent); background: rgba(108,99,255,0.2); color: var(--text); }
  .q-dot.answered-correct { background: rgba(67,233,123,0.2); border-color: var(--green); color: var(--green); }
  .q-dot.answered-wrong   { background: rgba(255,77,109,0.2); border-color: var(--red); color: var(--red); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🐍 Ôn Thi Python Cơ Bản</h1>
    <p>Bộ 40 câu hỏi trắc nghiệm Python cơ bản</p>
  </div>

  <div class="controls" id="controls">
    <label>Chế độ:</label>
    <select id="modeSelect">
      <option value="all">Tất cả 40 câu</option>
      <option value="random">Ngẫu nhiên</option>
    </select>
    <label id="numLabel" style="display:none">Số câu:</label>
    <input type="number" id="numQ" value="20" min="5" max="40" style="display:none">
    <div class="spacer"></div>
    <button class="btn btn-primary" onclick="startQuiz()">▶ Bắt đầu</button>
    <button class="btn btn-outline" onclick="toggleMap()">🗺 Bản đồ</button>
  </div>

  <div class="q-map" id="qMap" style="display:none"></div>

  <div class="progress-text" id="progressText" style="display:none">
    <span id="progressLabel">Câu 1 / X</span>
    <span id="progressScore">✓ 0 &nbsp; ✗ 0</span>
  </div>
  <div class="progress-bar-wrap" id="progressWrap" style="display:none">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <div id="questionArea"></div>

  <div class="nav" id="navArea" style="display:none">
    <button class="btn btn-outline" id="btnPrev" onclick="goTo(currentIdx-1)">← Trước</button>
    <button class="btn btn-outline" onclick="goTo(currentIdx+1)">Tiếp →</button>
    <button class="btn btn-primary" onclick="finishQuiz()">🏁 Kết quả</button>
  </div>

  <div class="score-card" id="scoreCard">
    <div class="score-big" id="scoreBig"></div>
    <h2 id="scoreTitle"></h2>
    <p id="scoreDesc"></p>
    <div class="score-stats">
      <span class="stat-pill stat-correct" id="statCorrect"></span>
      <span class="stat-pill stat-wrong"   id="statWrong"></span>
      <span class="stat-pill stat-skip"    id="statSkip"></span>
    </div>
    <button class="btn btn-primary" onclick="restartQuiz()" style="margin-right:10px">🔄 Làm lại</button>
    <button class="btn btn-outline" onclick="reviewAnswers()">📋 Xem đáp án</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  {
    q: `Đoạn mã sau giải quyết bài toán gì?
n = int(input())
mx = -1e9
for i in range(n):
    x = int(input())
    if x > mx:
        mx = x
print(mx)`,
    opts: [
      `Tìm số lớn nhất trong n số được nhập vào`,
      `Tìm số nhỏ nhất trong n số được nhập vào`,
      `Tính tổng n số được nhập vào`,
      `Đếm số lượng số dương trong n số`
    ],
    ans: 0,
    exp: `Biến mx được khởi tạo bằng một số rất nhỏ, sau đó liên tục cập nhật nếu tìm thấy x lớn hơn mx. Đây là thuật toán tìm giá trị lớn nhất (max).`
  },

  {
    q: `Để tính tổng S = 1 + 2 + 3 + ... + n, đoạn mã nào sau đây là đúng?`,
    opts: [
      `s = 0\nfor i in range(1, n + 1):\n    s += i`,
      `s = 1\nfor i in range(1, n):\n    s += i`,
      `s = 0\nfor i in range(n):\n    s = s + n`,
      `s = 0\nfor i in range(1, n + 1):\n    s *= i`
    ],
    ans: 0,
    exp: `Vòng lặp chạy từ 1 đến n (dùng range(1, n+1)). Biến s khởi tạo bằng 0 và cộng dồn từng giá trị của i.`
  },

  {
    q: `Đoạn mã sau thực hiện nhiệm vụ gì?
s = 0
for i in range(1, n + 1):
    if i % 2 == 0:
        s += i
print(s)`,
    opts: [
      `Tính tổng các số lẻ từ 1 đến n`,
      `Tính tổng các số chẵn từ 1 đến n`,
      `Đếm số lượng số chẵn từ 1 đến n`,
      `In ra các số chẵn từ 1 đến n`
    ],
    ans: 1,
    exp: `Lệnh if i % 2 == 0 kiểm tra số chẵn, sau đó s += i dùng để cộng dồn các số chẵn đó lại.`
  },

  {
    q: `Đoạn mã nào dưới đây giải quyết bài toán tính tổng dãy phân số: S = 1 + 1/2 + 1/3 + ... + 1/n?`,
    opts: [
      `s = 0\nfor i in range(1, n):\n    s += 1 // i`,
      `s = 1\nfor i in range(1, n + 1):\n    s += i / 1`,
      `s = 0\nfor i in range(1, n + 1):\n    s += 1 / i`,
      `s = 0\nfor i in range(n):\n    s += 1 % i`
    ],
    ans: 2,
    exp: `Sử dụng phép chia thực (/) để tính 1/i. Vòng lặp cần chạy từ 1 đến n, nên dùng range(1, n + 1).`
  },

  {
    q: `Đoạn mã sau giải quyết bài toán gì?
mn = 1e9
for x in arr:
    if x > 0 and x < mn:
        mn = x
print(mn)`,
    opts: [
      `Tìm số âm lớn nhất trong danh sách arr`,
      `Tìm số dương lớn nhất trong danh sách arr`,
      `Tìm số dương nhỏ nhất trong danh sách arr`,
      `Đếm số lượng số dương nhỏ hơn 1 tỷ`
    ],
    ans: 2,
    exp: `Điều kiện x > 0 lọc ra các số dương, x < mn giúp cập nhật để tìm ra số dương có giá trị nhỏ nhất (min).`
  },

  {
    q: `Cho cấp số cộng có số hạng đầu là u1 và công sai d. Đoạn mã nào tính đúng số hạng thứ n của dãy này? (Biết công thức Un = U1 + (n-1)*d)`,
    opts: [
      `un = u1 + n * d`,
      `un = u1 + (n - 1) * d`,
      `un = u1 * (n - 1) + d`,
      `un = (u1 + n) * d - 1`
    ],
    ans: 1,
    exp: `Chỉ cần chuyển đổi trực tiếp công thức toán học vào Python: u1 + (n - 1) * d.`
  },

  {
    q: `Đoạn mã nào dưới đây tính tổng dãy số đan dấu: S = 1 - 2 + 3 - 4 + ... + ((-1)^(n-1)) * n?`,
    opts: [
      `s = 0\nfor i in range(1, n + 1):\n    if i % 2 == 0:\n        s -= i\n    else:\n        s += i`,
      `s = 0\nfor i in range(1, n + 1):\n    if i % 2 != 0:\n        s -= i\n    else:\n        s += i`,
      `s = 0\nfor i in range(1, n + 1):\n    s += i * (-1)`,
      `s = 0\nfor i in range(1, n + 1):\n    s -= i`
    ],
    ans: 0,
    exp: `Dãy số có quy luật: số lẻ mang dấu dương (cộng vào), số chẵn mang dấu âm (trừ đi). Do đó ta dùng if i % 2 == 0 để trừ đi số chẵn.`
  },

  {
    q: `Đoạn mã sau giải quyết bài toán gì?
f1, f2 = 1, 1
for i in range(3, n + 1):
    fn = f1 + f2
    f1 = f2
    f2 = fn
print(fn)`,
    opts: [
      `Tính tổng n số tự nhiên đầu tiên`,
      `Tìm số hạng thứ n của dãy Fibonacci`,
      `Kiểm tra n có phải số Fibonacci không`,
      `Tìm ước chung lớn nhất của f1 và f2`
    ],
    ans: 1,
    exp: `Đây là thuật toán sinh số Fibonacci. fn = f1 + f2 tính số tiếp theo, sau đó dịch chuyển f1 và f2 để tính tiếp cho đến số hạng thứ n.`
  },

  {
    q: `Bạn cần tính tổng bình phương các số từ 1 đến n (S = 1^2 + 2^2 + ... + n^2). Đoạn code nào sau đây là đúng?`,
    opts: [
      `s = 0\nfor i in range(1, n + 1):\n    s += i * 2`,
      `s = 0\nfor i in range(1, n + 1):\n    s += i ** 2`,
      `s = 0\nfor i in range(1, n + 1):\n    s = i * i`,
      `s = 1\nfor i in range(1, n + 1):\n    s *= i ** 2`
    ],
    ans: 1,
    exp: `Toán tử ** trong Python dùng để tính lũy thừa. i ** 2 là bình phương của i. Biến s dùng để cộng dồn các bình phương này.`
  },

  {
    q: `Đoạn mã sau làm nhiệm vụ gì?
s = 0
for i in range(1, n + 1):
    if i % 3 == 0 and i % 5 == 0:
        s += i
print(s)`,
    opts: [
      `Tính tổng các số chia hết cho 3 hoặc chia hết cho 5 trong đoạn từ 1 đến n`,
      `Tính tổng các số chia hết cho 15 (cả 3 và 5) trong đoạn từ 1 đến n`,
      `Đếm số lượng các số chia hết cho 15 trong đoạn từ 1 đến n`,
      `In ra các số chia hết cho 3 và 5 trong đoạn từ 1 đến n`
    ],
    ans: 1,
    exp: `Điều kiện i % 3 == 0 and i % 5 == 0 nghĩa là số đó phải đồng thời chia hết cho 3 và 5 (tức là chia hết cho 15). s += i là phép tính tổng.`
  },

{
    q: `Đoạn mã sau giải quyết bài toán gì?
s = 0
for i in range(1, n + 1):
    if n % i == 0:
        s += i
print(s)`,
    opts: [
      `Tính tổng các số từ 1 đến n`,
      `Tính tổng các ước số của n`,
      `Đếm số lượng ước số của n`,
      `Kiểm tra n có phải là số nguyên tố không`
    ],
    ans: 1,
    exp: `Điều kiện n % i == 0 dùng để kiểm tra i có phải là ước của n hay không. Biến s += i sẽ cộng dồn các ước số đó lại.`
  },

  {
    q: `Đoạn mã nào dưới đây giải quyết bài toán tìm số chẵn lớn nhất trong n số được nhập vào? (Giả sử các số đều lớn hơn 0)`,
    opts: [
      `mx = 0\nfor i in range(n):\n    x = int(input())\n    if x % 2 == 0 and x > mx:\n        mx = x`,
      `mx = 0\nfor i in range(n):\n    x = int(input())\n    if x % 2 != 0 and x > mx:\n        mx = x`,
      `mx = 1e9\nfor i in range(n):\n    x = int(input())\n    if x % 2 == 0 and x < mx:\n        mx = x`,
      `mx = 0\nfor i in range(n):\n    x = int(input())\n    if x > mx:\n        mx = x`
    ],
    ans: 0,
    exp: `Cần thỏa mãn 2 điều kiện: x phải là số chẵn (x % 2 == 0) và x phải lớn hơn kỉ lục lớn nhất hiện tại (x > mx).`
  },

  {
    q: `Đoạn mã sau làm nhiệm vụ gì?
mx = -1e9
count = 0
for x in arr:
    if x > mx:
        mx = x
        count = 1
    elif x == mx:
        count += 1
print(count)`,
    opts: [
      `Tính tổng các số lớn nhất trong mảng`,
      `Tìm giá trị lớn nhất trong mảng`,
      `Đếm số lần xuất hiện của giá trị lớn nhất trong mảng`,
      `Đếm số lượng phần tử dương trong mảng`
    ],
    ans: 2,
    exp: `Khi tìm được một giá trị lớn hơn hẳn mx, biến đếm count được reset về 1. Nếu gặp giá trị bằng mx, biến đếm count tăng thêm 1.`
  },

  {
    q: `Để tính tổng S = 1/2 + 2/3 + 3/4 + ... + n/(n+1), đoạn mã nào sau đây là đúng?`,
    opts: [
      `s = 0\nfor i in range(1, n + 1):\n    s += i / (i + 1)`,
      `s = 0\nfor i in range(1, n + 1):\n    s += (i + 1) / i`,
      `s = 0\nfor i in range(1, n):\n    s += i / (i + 1)`,
      `s = 1\nfor i in range(1, n + 1):\n    s *= i / (i + 1)`
    ],
    ans: 0,
    exp: `Mỗi phần tử của dãy có dạng i / (i+1). Vòng lặp chạy từ 1 đến n (tương ứng với tử số) là chính xác.`
  },

  {
    q: `Đoạn mã sau giải quyết bài toán gì?
p = 1
for i in range(1, n + 1):
    p *= i
print(p)`,
    opts: [
      `Tính tổng các số từ 1 đến n`,
      `Tính lũy thừa cơ số p bậc n`,
      `Tính giai thừa của n (n!)`,
      `Đếm các ước số của n`
    ],
    ans: 2,
    exp: `Biến p được khởi tạo bằng 1, sau đó nhân dồn liên tiếp với i từ 1 đến n. Đây là thuật toán tính n!.`
  },

  {
    q: `Muốn tính tổng S = 1! + 2! + 3! + ... + n!, đoạn mã nào sau đây vừa đúng vừa tối ưu (chỉ dùng 1 vòng lặp)?`,
    opts: [

];let questions = [];
let currentIdx = 0;
let answers = {};
let mode = 'all';
let quizStarted = false;

const modeSelect = document.getElementById('modeSelect');
const numQInput = document.getElementById('numQ');
const numLabel = document.getElementById('numLabel');

modeSelect.addEventListener('change', () => {
  const isRandom = modeSelect.value === 'random';
  numLabel.style.display = isRandom ? '' : 'none';
  numQInput.style.display = isRandom ? '' : 'none';
});

function startQuiz() {
  mode = modeSelect.value;
  if (mode === 'random') {
    const n = Math.min(Math.max(parseInt(numQInput.value)||20, 5), ALL_QUESTIONS.length);
    numQInput.value = n;
    questions = shuffle([...ALL_QUESTIONS]).slice(0, n);
  } else {
    questions = [...ALL_QUESTIONS];
  }
  answers = {};
  currentIdx = 0;
  quizStarted = true;
  document.getElementById('scoreCard').classList.remove('show');
  document.getElementById('progressText').style.display = '';
  document.getElementById('progressWrap').style.display = '';
  document.getElementById('navArea').style.display = '';
  updateProgress();
  renderQuestion(currentIdx);
  buildMap();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderQuestion(idx) {
  if (!questions.length) return;
  currentIdx = idx;
  const q = questions[idx];
  const chosen = answers[idx];
  const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];
  const disabled = chosen !== undefined;

  const optsHtml = q.opts.map((opt, i) => {
    let cls = 'option';
    const isCorrect = Array.isArray(q.ans) ? q.ans.includes(i) : i === q.ans;
    
    if (disabled) {
      cls += ' disabled';
      if (isCorrect) cls += ' correct';
      else if (i === chosen) cls += ' wrong';
    } else if (chosen === i) cls += ' selected';
    
    return `<div class="${cls}" onclick="selectOption(${idx}, ${i})">
      <div class="option-letter">${letters[i]}</div>
      <div class="option-text">${opt}</div>
    </div>`;
  }).join('');

  const expHtml = (disabled && q.exp) ? `<div class="explanation show"><strong>📖 Giải thích:</strong>\n${q.exp}</div>` : `<div class="explanation"></div>`;

  document.getElementById('questionArea').innerHTML = `
    <div class="question-card">
      <div class="q-header">
        <div class="q-num">Câu ${idx+1} / ${questions.length}</div>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHtml}</div>
      ${expHtml}
    </div>`;
  document.getElementById('btnPrev').disabled = idx === 0;
  updateProgress();
  updateMap();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function selectOption(idx, choice) {
  if (answers[idx] !== undefined) return;
  answers[idx] = choice;
  renderQuestion(idx);
}

function goTo(idx) {
  if (idx < 0 || idx >= questions.length) return;
  renderQuestion(idx);
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const correct = Object.keys(answers).filter(k => Array.isArray(questions[k].ans) ? questions[k].ans.includes(answers[k]) : answers[k] === questions[k].ans).length;
  const wrong = answered - correct;
  document.getElementById('progressLabel').textContent = `Câu ${currentIdx+1} / ${questions.length} · Đã làm: ${answered}`;
  document.getElementById('progressScore').textContent = `✓ ${correct}  ✗ ${wrong}`;
  document.getElementById('progressBar').style.width = `${(answered/questions.length)*100}%`;
}

function buildMap() {
  const map = document.getElementById('qMap');
  map.innerHTML = questions.map((_, i) => `<div class="q-dot" id="dot${i}" onclick="goTo(${i})">${i+1}</div>`).join('');
  updateMap();
}

function updateMap() {
  questions.forEach((q, i) => {
    const dot = document.getElementById(`dot${i}`);
    if (!dot) return;
    dot.className = 'q-dot';
    if (i === currentIdx) dot.classList.add('current');
    if (answers[i] !== undefined) {
      const isCorrect = Array.isArray(q.ans) ? q.ans.includes(answers[i]) : answers[i] === q.ans;
      dot.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
    }
  });
}

function toggleMap() {
  const map = document.getElementById('qMap');
  map.style.display = map.style.display === 'none' ? 'flex' : 'none';
}

function finishQuiz() {
  const answered = Object.keys(answers).length;
  const correct = Object.keys(answers).filter(k => Array.isArray(questions[k].ans) ? questions[k].ans.includes(answers[k]) : answers[k] === questions[k].ans).length;
  const wrong = answered - correct;
  const skip = questions.length - answered;
  const pct = Math.round((correct / questions.length) * 100);

  document.getElementById('scoreCard').classList.add('show');
  document.getElementById('scoreBig').textContent = `${pct}%`;
  document.getElementById('scoreTitle').textContent = pct >= 80 ? 'Xuất sắc!' : pct >= 60 ? 'Khá tốt!' : 'Cần ôn thêm!';
  document.getElementById('scoreDesc').textContent = `${correct} đúng / ${questions.length} câu`;
  document.getElementById('statCorrect').textContent = `✓ ${correct} đúng`;
  document.getElementById('statWrong').textContent = `✗ ${wrong} sai`;
  document.getElementById('statSkip').textContent = `— ${skip} chưa làm`;
  document.getElementById('scoreCard').scrollIntoView({behavior:'smooth'});
}

function restartQuiz() {
  document.getElementById('scoreCard').classList.remove('show');
  startQuiz();
}

function reviewAnswers() {
  document.getElementById('scoreCard').classList.remove('show');
  goTo(0);
}

// init
document.getElementById('progressText').style.display = 'none';
document.getElementById('progressWrap').style.display = 'none';
document.getElementById('navArea').style.display = 'none';
document.getElementById('questionArea').innerHTML = `
  <div class="question-card" style="text-align:center;padding:48px 28px">
    <div style="font-size:3rem;margin-bottom:16px">📖</div>
    <h2 style="font-family:'Playfair Display',serif;margin-bottom:8px">Sẵn sàng ôn thi Python cơ bản?</h2>
    <p style="color:var(--muted)">Hệ thống tải thành công <strong>Tất cả 40 câu hỏi</strong>. Chọn chế độ và nhấn <strong>Bắt đầu</strong> để làm bài</p>
  </div>`;
</script>
